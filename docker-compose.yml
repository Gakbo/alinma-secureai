services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alinma_user
      POSTGRES_PASSWORD: alinma_pass
      POSTGRES_DB: alinma_secureai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alinma_user -d alinma_secureai"]
      interval: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://alinma_user:alinma_pass@db:5432/alinma_secureai
      # Demo secret. Generate a real one for any deployment:
      #   python -c "import secrets; print(secrets.token_hex(32))"
      SECRET_KEY: change-me-for-production
      # Mirror the local setup: trained transformer for SMS, rule engine for
      # transactions (see README "Honest limitations" for why).
      MODEL_BACKEND: auto
      TXN_MODEL_BACKEND: rules
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
