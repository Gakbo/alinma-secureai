services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alinma_user
      POSTGRES_PASSWORD: alinma_pass
      POSTGRES_DB: alinma_secureai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alinma_user -d alinma_secureai"]
      interval: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://alinma_user:alinma_pass@db:5432/alinma_secureai
      SECRET_KEY: change-me-for-production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
