services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alinma_user
      POSTGRES_PASSWORD: alinma_pass
      POSTGRES_DB: alinma_secureai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alinma_user -d alinma_secureai"]
      interval: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://alinma_user:alinma_pass@db:5432/alinma_secureai
      # Demo secret. Generate a real one for any deployment:
      #   python -c "import secrets; print(secrets.token_hex(32))"
      SECRET_KEY: change-me-for-production
      # SMS: transformer -> TF-IDF -> rules; transactions: model if trained.
      MODEL_BACKEND: auto
      TXN_MODEL_BACKEND: ${TXN_MODEL_BACKEND:-auto}
      # AI chatbot (optional — rule-based fallback answers without a key).
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Email delivery (optional — reset links print to the backend console
      # when unset). See docs/smtp-setup.md.
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Public frontend URL embedded in password-reset emails.
      APP_URL: ${APP_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
