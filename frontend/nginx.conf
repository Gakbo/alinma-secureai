server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # React Router: serve index.html for all client-side routes
  location / {
    try_files $uri /index.html;
  }

  # Proxy API calls to the backend container
  location /api/ {
    proxy_pass http://backend:8000/;
    proxy_set_header Host $host;
  }
}
